<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chat-DB — 自然语言数据库查询</title>
<style>
  :root {
    --bg-deep: #060b14;
    --bg-panel: #0d1525;
    --bg-card: #111c32;
    --bg-input: #0a101f;
    --text-primary: #e8ecf1;
    --text-secondary: #8899b4;
    --text-muted: #4a5a78;
    --accent: #f0b830;
    --accent-dim: #d9a018;
    --accent-glow: rgba(240,184,48,0.15);
    --sql-bg: #080e1a;
    --sql-text: #7ecb8a;
    --error: #e0556a;
    --success: #4ecb8c;
    --border: #1a2844;
    --radius: 12px;
    --shadow: 0 2px 24px rgba(0,0,0,0.4);
  }
  * { margin:0; padding:0; box-sizing:border-box }
  body {
    font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",system-ui,-apple-system,sans-serif;
    background:var(--bg-deep); color:var(--text-primary); height:100vh; overflow:hidden;
  }
  .app { display:flex; height:100vh }
  /* ── Sidebar ── */
  .sidebar {
    width:280px; min-width:280px; background:var(--bg-panel); border-right:1px solid var(--border);
    display:flex; flex-direction:column; transition:transform .3s ease;
  }
  .sidebar-header {
    padding:24px 20px 16px; border-bottom:1px solid var(--border);
    display:flex; align-items:center; gap:12px;
  }
  .logo { width:32px; height:32px; background:linear-gradient(135deg,var(--accent),#e08020); border-radius:8px;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:16px; color:#0a0e17 }
  .logo-text { font-size:17px; font-weight:700; letter-spacing:-0.3px }
  .sidebar-actions { padding:12px 16px }
  .btn-new {
    width:100%; padding:10px 16px; background:var(--accent); color:#0a0e17; border:none; border-radius:10px;
    font-size:14px; font-weight:600; cursor:pointer; transition:all .2s; font-family:inherit;
  }
  .btn-new:hover { background:#f5c850; transform:translateY(-1px) }
  .conv-list { flex:1; overflow-y:auto; padding:8px 12px }
  .conv-item {
    padding:12px 14px; border-radius:10px; cursor:pointer; transition:all .15s;
    margin-bottom:4px; font-size:13px; color:var(--text-secondary);
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .conv-item:hover { background:var(--bg-card); color:var(--text-primary) }
  .conv-item.active { background:var(--accent-glow); color:var(--accent); font-weight:500 }

  /* ── Main Chat ── */
  .main { flex:1; display:flex; flex-direction:column; min-width:0 }
  .chat-header { padding:16px 28px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px }
  .chat-header .dot { width:8px; height:8px; background:var(--success); border-radius:50%; animation:pulse 2s infinite }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .messages { flex:1; overflow-y:auto; padding:24px 28px; display:flex; flex-direction:column; gap:20px }
  .msg { display:flex; gap:12px; animation:fadeUp .3s ease }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { flex-direction:row-reverse }
  .msg-avatar {
    width:36px; height:36px; border-radius:50%; flex-shrink:0; display:flex; align-items:center;
    justify-content:center; font-size:14px; font-weight:700;
  }
  .msg.user .msg-avatar { background:var(--accent); color:#0a0e17 }
  .msg.system .msg-avatar { background:var(--bg-card); color:var(--accent); border:1px solid var(--border) }
  .msg-bubble {
    max-width:72%; padding:14px 18px; border-radius:16px; font-size:14px; line-height:1.6;
    word-break:break-word;
  }
  .msg.user .msg-bubble { background:var(--accent); color:#0a0e17; border-bottom-right-radius:4px }
  .msg.system .msg-bubble { background:var(--bg-card); border:1px solid var(--border); border-bottom-left-radius:4px }

  /* SQL block */
  .sql-block {
    background:var(--sql-bg); border:1px solid var(--border); border-radius:10px; margin-top:10px;
    overflow:hidden; font-family:"JetBrains Mono","Cascadia Code","Fira Code",monospace; font-size:12px;
  }
  .sql-block .sql-header { padding:8px 14px; font-size:11px; color:var(--text-muted); border-bottom:1px solid var(--border); display:flex; justify-content:space-between }
  .sql-block .sql-body { padding:12px 14px; color:var(--sql-text); overflow-x:auto; white-space:pre-wrap }
  .sql-block .sql-conf { color:var(--accent); font-weight:600 }

  /* Confirm card */
  .confirm-card {
    background:var(--bg-card); border:1px solid var(--accent); border-radius:12px; padding:16px 18px;
  }
  .confirm-card h4 { font-size:14px; margin-bottom:8px; color:var(--accent) }
  .confirm-card ul { list-style:none; font-size:13px; color:var(--text-secondary); margin-bottom:12px }
  .confirm-card ul li { padding:3px 0 }
  .confirm-card .btns { display:flex; gap:8px }
  .btn-confirm { padding:8px 20px; background:var(--accent); color:#0a0e17; border:none; border-radius:8px; font-weight:600; cursor:pointer; font-family:inherit }
  .btn-reject { padding:8px 20px; background:transparent; color:var(--text-secondary); border:1px solid var(--border); border-radius:8px; cursor:pointer; font-family:inherit }

  /* Result table */
  .result-table { margin-top:10px; border-collapse:collapse; width:100%; font-size:13px }
  .result-table th { text-align:left; padding:8px 12px; background:var(--bg-input); color:var(--accent); font-weight:600; border-bottom:1px solid var(--border) }
  .result-table td { padding:8px 12px; border-bottom:1px solid var(--border); color:var(--text-secondary) }

  /* Status indicator */
  .status-bar { padding:4px 16px; font-size:11px; color:var(--text-muted); border-top:1px solid var(--border); display:flex; gap:12px }
  .status-step { display:flex; align-items:center; gap:6px }
  .status-step .sdot { width:6px; height:6px; border-radius:50%; background:var(--text-muted) }
  .status-step.done .sdot { background:var(--success) }
  .status-step.active .sdot { background:var(--accent); animation:pulse 1s infinite }

  /* Input area */
  .input-area { padding:16px 28px 20px; border-top:1px solid var(--border) }
  .input-wrap { display:flex; gap:10px; align-items:flex-end }
  .input-field {
    flex:1; padding:14px 18px; background:var(--bg-input); border:1px solid var(--border); border-radius:14px;
    color:var(--text-primary); font-size:14px; font-family:inherit; resize:none; outline:none;
    transition:border-color .2s; min-height:48px; max-height:120px;
  }
  .input-field:focus { border-color:var(--accent) }
  .btn-send {
    width:48px; height:48px; background:var(--accent); color:#0a0e17; border:none; border-radius:14px;
    cursor:pointer; font-size:18px; transition:all .2s; flex-shrink:0; display:flex; align-items:center; justify-content:center;
  }
  .btn-send:hover { background:#f5c850 }
  .btn-send:disabled { opacity:.4; cursor:not-allowed }

  /* Empty state */
  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; color:var(--text-muted) }
  .empty-state .icon { font-size:48px; opacity:.3 }
  .empty-state h2 { font-size:18px; color:var(--text-secondary); font-weight:500 }
  .empty-state p { font-size:13px; text-align:center; max-width:400px; line-height:1.7 }
  .empty-state .hints { display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; justify-content:center }
  .empty-state .hint {
    padding:6px 14px; background:var(--bg-card); border:1px solid var(--border); border-radius:20px;
    font-size:12px; color:var(--text-secondary); cursor:pointer; transition:all .15s;
  }
  .empty-state .hint:hover { border-color:var(--accent); color:var(--accent) }

  .sidebar-footer { padding:12px; border-top:1px solid var(--border); display:flex; gap:6px }
  .btn-mode {
    flex:1; padding:8px; border:1px solid var(--border); background:transparent; color:var(--text-secondary);
    border-radius:8px; font-size:12px; cursor:pointer; font-family:inherit; transition:all .15s
  }
  .btn-mode:hover { border-color:var(--accent) }

  /* ── Admin Panel ── */
  .admin-panel { flex:1; display:none; flex-direction:column; overflow-y:auto; padding:24px 28px; gap:24px }
  .admin-panel.show { display:flex }
  .admin-section { background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden }
  .admin-section h3 { padding:14px 18px; font-size:13px; font-weight:600; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center }
  .admin-section h3 .stat { font-size:11px; color:var(--text-muted); font-weight:400 }
  .admin-section .body { padding:14px 18px; font-size:13px; color:var(--text-secondary); line-height:1.8 }
  .admin-row { display:flex; gap:12px; align-items:center; padding:6px 0 }
  .admin-row label { min-width:60px; font-size:12px; color:var(--text-muted) }
  .admin-row input, .admin-row select { flex:1; padding:6px 10px; background:var(--bg-input); border:1px solid var(--border); border-radius:6px; color:var(--text-primary); font-size:12px; font-family:inherit }
  .btn-sm { padding:6px 14px; background:var(--accent); color:#0a0e17; border:none; border-radius:6px; font-size:12px; cursor:pointer; font-family:inherit }
  .btn-sm.danger { background:var(--error); color:#fff }
  .tag { display:inline-block; padding:2px 8px; background:var(--bg-card); border:1px solid var(--border); border-radius:4px; font-size:11px; margin:2px }

  @media (max-width:768px) {
    .sidebar { position:fixed; left:0; z-index:10; transform:translateX(-100%) }
    .sidebar.open { transform:translateX(0) }
  }
</style>
</head>
<body>
<div class="app">
  <!-- ── Sidebar ── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">Q</div>
      <span class="logo-text">Chat-DB</span>
    </div>
    <div class="sidebar-actions">
      <button class="btn-new" onclick="newSession()">+ 新建会话</button>
    </div>
    <div class="conv-list" id="convList"></div>
    <div class="sidebar-footer">
      <button class="btn-mode" id="btnChat" onclick="switchMode('chat')" style="background:var(--accent);color:#0a0e17">对话</button>
      <button class="btn-mode" id="btnAdmin" onclick="switchMode('admin')">管理</button>
    </div>
  </aside>

  <!-- ── Main Chat ── -->
  <main class="main">
    <header class="chat-header">
      <div class="dot"></div>
      <span style="font-size:14px;font-weight:500">Chat-DB</span>
      <span style="font-size:12px;color:var(--text-muted);margin-left:auto" id="endpointStatus">已连接 :8000</span>
    </header>

    <div class="messages" id="messages">
      <div class="empty-state">
        <div class="icon">&#9670;</div>
        <h2>用自然语言查询你的数据库</h2>
        <p>输入中文口语查询，系统自动理解意图、匹配字段、生成 SQL 并执行。</p>
        <div class="hints">
          <span class="hint" onclick="sendHint('昨天的订单总数')">昨天的订单总数</span>
          <span class="hint" onclick="sendHint('上个月已完成的订单')">上个月已完成的订单</span>
          <span class="hint" onclick="sendHint('本月销售额')">本月销售额</span>
          <span class="hint" onclick="sendHint('华为的合同')">华为的合同</span>
        </div>
      </div>
    </div>

    <div class="status-bar" id="statusBar" style="display:none">
      <span class="status-step active" id="step1"><span class="sdot"></span>语义匹配</span>
      <span>→</span>
      <span class="status-step" id="step2"><span class="sdot"></span>SQL 生成</span>
      <span>→</span>
      <span class="status-step" id="step3"><span class="sdot"></span>安全校验</span>
      <span>→</span>
      <span class="status-step" id="step4"><span class="sdot"></span>执行</span>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea class="input-field" id="queryInput" placeholder="输入查询，例如「昨天的订单总数」…" rows="1"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendQuery()}"></textarea>
        <button class="btn-send" id="sendBtn" onclick="sendQuery()">&#8593;</button>
      </div>
    </div>
  </main>

  <!-- ══ Admin Panel ══ -->
  <div class="admin-panel" id="adminPanel">
    <h2 style="font-size:18px;font-weight:600;margin-bottom:4px">管理控制台</h2>

    <div class="admin-section">
      <h3>同步状态 <span class="stat" id="syncStat">—</span></h3>
      <div class="body" id="syncBody">加载中…</div>
    </div>

    <div class="admin-section">
      <h3>知识图谱 <span class="stat" id="graphStat">—</span></h3>
      <div class="body" id="graphBody">加载中…</div>
    </div>

    <div class="admin-section">
      <h3>值映射（枚举别名） <button class="btn-sm" onclick="loadMappings()" style="float:right">刷新</button></h3>
      <div class="body" id="mappingBody">加载中…</div>
    </div>

    <div class="admin-section">
      <h3>热词词典 <button class="btn-sm" onclick="loadHotwords()" style="float:right">刷新</button></h3>
      <div class="body" id="hotwordBody">加载中…</div>
    </div>

    <div class="admin-section">
      <h3>固定日期周期</h3>
      <div class="body" id="periodBody">加载中…</div>
    </div>

    <div class="admin-section">
      <h3>审核策略</h3>
      <div class="body" id="auditBody">加载中…</div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let sessionId = null;
let conversations = [];
let currentMsgId = null;

// ── Session ──
async function newSession() {
  try {
    const r = await fetch(API+'/api/session', { method:'POST' });
    const d = await r.json();
    sessionId = d.session_id;
    conversations.unshift({ id:sessionId, title:'新建会话', time:new Date().toLocaleTimeString() });
    renderSidebar();
    document.getElementById('messages').innerHTML = '';
    document.getElementById('statusBar').style.display = 'none';
  } catch(e) { console.warn('创建会话失败', e) }
}

function sendHint(text) {
  document.getElementById('queryInput').value = text;
  sendQuery();
}

async function sendQuery() {
  const input = document.getElementById('queryInput');
  const text = input.value.trim();
  if (!text) return;
  if (!sessionId) await newSession();

  input.value = '';
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  document.getElementById('statusBar').style.display = 'flex';
  resetSteps();

  // Clear empty state
  const msgs = document.getElementById('messages');
  const empty = msgs.querySelector('.empty-state');
  if (empty) empty.remove();

  // User bubble
  addBubble('user', text);

  // System bubble placeholder
  const sysId = 'sys-' + Date.now();
  addBubble('system', '<span class="status-text">思考中…</span>', sysId);
  currentMsgId = sysId;

  try {
    const r = await fetch(API+'/api/query', {
      method:'POST',
      headers: { 'Content-Type':'application/json', 'X-Session-Id': sessionId||'' },
      body: JSON.stringify({text})
    });
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split('\n\n');
      buffer = lines.pop();
      for (const line of lines) {
        const m = line.match(/^data: (.+)/);
        if (!m) continue;
        try {
          const evt = JSON.parse(m[1]);
          handleSSE(evt);
        } catch(e) {}
      }
    }
  } catch(e) {
    updateBubble(sysId, `<span style="color:var(--error)">连接失败：${e.message}</span>`);
  }
  sendBtn.disabled = false;
  updateConversationTitle(text);
}

function handleSSE(evt) {
  switch(evt.type) {
    case 'status':
      if (!evt.session_id || evt.session_id === sessionId) return;
      setStep(1, 'done');
      if (evt.message === 'starting') { setStep(2,'active'); updateBubble(currentMsgId,'<span class="status-text">正在分析查询…</span>') }
      else if (evt.message && evt.message !== 'starting' && evt.message !== 'done') {
        updateBubble(currentMsgId, `<span>${evt.message}</span>`);
      }
      break;
    case 'result':
      setStep(1,'done'); setStep(2,'done'); setStep(3,'done'); setStep(4,'done');
      if (evt.data) {
        let html = '';
        if (evt.data.columns && evt.data.rows) {
          html += renderTable(evt.data.columns, evt.data.rows);
        } else if (typeof evt.data === 'string') {
          html += `<span>${evt.data}</span>`;
        } else {
          html += `<span>${JSON.stringify(evt.data)}</span>`;
        }
        updateBubble(currentMsgId, html);
      }
      break;
    case 'need_confirm':
      setStep(1,'done'); setStep(2,'done');
      let ch = '<div class="confirm-card"><h4>⚠ 需要确认以下内容</h4><ul>';
      if (evt.items) evt.items.forEach(item => ch += `<li>• ${item.reason||item.field||JSON.stringify(item)}</li>`);
      ch += '</ul><div class="btns"><button class="btn-confirm" onclick="confirmQuery(true)">确认</button><button class="btn-reject" onclick="confirmQuery(false)">取消</button></div></div>';
      updateBubble(currentMsgId, ch);
      break;
    case 'error':
      updateBubble(currentMsgId, `<span style="color:var(--error)">错误：${evt.detail}</span>`);
      break;
    case 'done':
      setStep(1,'done'); setStep(2,'done'); setStep(3,'done'); setStep(4,'done');
      break;
  }
}

// ── UI Helpers ──
function addBubble(role, html, id) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (id) div.id = id;
  div.innerHTML = `<div class="msg-avatar">${role==='user'?'你':'Q'}</div><div class="msg-bubble">${html}</div>`;
  document.getElementById('messages').appendChild(div);
  div.scrollIntoView({behavior:'smooth'});
}

function updateBubble(id, html) {
  const el = document.getElementById(id);
  if (el) { el.querySelector('.msg-bubble').innerHTML = html; el.scrollIntoView({behavior:'smooth'}); }
}

function renderTable(cols, rows) {
  let h = '<table class="result-table"><thead><tr>';
  cols.forEach(c => h += `<th>${c}</th>`);
  h += '</tr></thead><tbody>';
  rows.forEach(row => {
    h += '<tr>';
    (Array.isArray(row)?row:Object.values(row)).forEach(v => h += `<td>${v??''}</td>`);
    h += '</tr>';
  });
  h += '</tbody></table>';
  return h;
}

function setStep(n, state) {
  const el = document.getElementById('step'+n);
  if (el) { el.className = 'status-step '+(state||'active'); if(state==='done') el.classList.add('done') }
}

function resetSteps() {
  for (let i=1; i<=4; i++) { const el = document.getElementById('step'+i); if(el) el.className = 'status-step' }
  setStep(1, 'active');
}

function confirmQuery(ok) {
  // In a real app, this would POST /api/query/{id}/confirm
  updateBubble(currentMsgId, ok ? '已确认，继续执行…' : '查询已取消');
}

function updateConversationTitle(text) {
  const conv = conversations.find(c => c.id === sessionId);
  if (conv && conv.title === '新建会话') { conv.title = text.slice(0,24)+(text.length>24?'…':''); renderSidebar() }
}

function renderSidebar() {
  const list = document.getElementById('convList');
  list.innerHTML = conversations.map(c =>
    `<div class="conv-item${c.id===sessionId?' active':''}" onclick="switchConv('${c.id}')">${c.title}<br><span style="font-size:11px;color:var(--text-muted)">${c.time}</span></div>`
  ).join('');
}

function switchConv(id) {
  sessionId = id;
  renderSidebar();
  document.getElementById('messages').innerHTML = '<div class="empty-state"><div class="icon">&#9670;</div><h2>继续对话</h2></div>';
}

// ── Admin Mode ──
let currentMode = 'chat';

function switchMode(mode) {
  currentMode = mode;
  document.getElementById('btnChat').style.background = mode==='chat'?'var(--accent)':'transparent';
  document.getElementById('btnChat').style.color = mode==='chat'?'#0a0e17':'var(--text-secondary)';
  document.getElementById('btnAdmin').style.background = mode==='admin'?'var(--accent)':'transparent';
  document.getElementById('btnAdmin').style.color = mode==='admin'?'#0a0e17':'var(--text-secondary)';
  document.querySelector('.main').style.display = mode==='admin'?'none':'flex';
  const ap = document.getElementById('adminPanel');
  ap.classList.toggle('show', mode==='admin');
  if (mode==='admin') loadAllAdmin();
}

async function loadAllAdmin() {
  loadSyncStatus();
  loadGraphData();
  loadMappings();
  loadHotwords();
  loadPeriods();
  loadAuditPolicy();
}

async function loadSyncStatus() {
  try {
    const r = await fetch(API+'/api/admin/sync/status');
    const d = await r.json();
    document.getElementById('syncStat').textContent = d.status||'—';
    document.getElementById('syncBody').innerHTML = d.latest
      ? `<div class="admin-row"><label>类型</label><span>${d.latest.sync_type||'—'}</span></div>
         <div class="admin-row"><label>状态</label><span>${d.latest.status||'—'}</span></div>
         <div class="admin-row"><label>时间</label><span>${d.latest.started_at||'—'}</span></div>
         <button class="btn-sm" onclick="triggerSync()">触发全量同步</button>`
      : '<span>暂无同步记录</span> <button class="btn-sm" onclick="triggerSync()">触发全量同步</button>';
  } catch(e) { document.getElementById('syncBody').innerHTML = '<span style="color:var(--error)">加载失败</span>'; }
}

async function triggerSync() {
  try {
    await fetch(API+'/api/admin/sync/trigger', {method:'POST'});
    setTimeout(loadSyncStatus, 2000);
  } catch(e) { alert('触发同步失败: '+e.message); }
}

async function loadGraphData() {
  try {
    const nr = await fetch(API+'/api/admin/graph/nodes/active');
    const nd = await nr.json();
    const er = await fetch(API+'/api/admin/graph/edges/active');
    const ed = await er.json();
    document.getElementById('graphStat').textContent = `${nd.tables||0} 表 / ${nd.columns||0} 列 / ${(ed.edges||[]).length} 边`;
    let html = `<span class="tag">表: ${nd.tables||0}</span> <span class="tag">列: ${nd.columns||0}</span>`;
    if (ed.edges && ed.edges.length) {
      html += '<br><br><b>关系边</b><br>';
      ed.edges.slice(0,10).forEach(e => html += `<span class="tag">${e.type} ${e.from_table}.${e.from_column}→${e.to_table}.${e.to_column}</span>`);
    }
    document.getElementById('graphBody').innerHTML = html;
  } catch(e) { document.getElementById('graphBody').innerHTML = '<span style="color:var(--error)">加载失败</span>'; }
}

async function loadMappings() {
  try {
    const r = await fetch(API+'/api/admin/mappings/enum?data_source_id=00000000-0000-0000-0000-000000000001');
    const d = await r.json();
    const items = d.items||[];
    let html = `<span>共 ${items.length} 条</span><br><br>`;
    items.slice(0,20).forEach(it => {
      html += `<div class="admin-row"><span>${it.table_name}.${it.column_name}</span><span class="tag">${it.value}</span><span>→ ${it.display||it.value}</span></div>`;
    });
    document.getElementById('mappingBody').innerHTML = html;
  } catch(e) { document.getElementById('mappingBody').innerHTML = '<span style="color:var(--error)">加载失败</span>'; }
}

async function loadHotwords() {
  try {
    const r = await fetch(API+'/api/admin/hotwords');
    const d = await r.json();
    let html = '';
    (d.items||[]).forEach(it => html += `<span class="tag">${it.term} → ${it.target_table||''}.${it.target_column||it.formula||''}</span> `);
    document.getElementById('hotwordBody').innerHTML = html||'暂无热词';
  } catch(e) { document.getElementById('hotwordBody').innerHTML = '<span style="color:var(--error)">加载失败</span>'; }
}

async function loadPeriods() {
  try {
    const r = await fetch(API+'/api/admin/fixed-periods');
    const d = await r.json();
    let html = '';
    (d.items||[]).forEach(it => html += `<span class="tag">${it.name}: ${it.start}~${it.end}</span> `);
    document.getElementById('periodBody').innerHTML = html||'暂无周期';
  } catch(e) { document.getElementById('periodBody').innerHTML = '<span style="color:var(--error)">加载失败</span>'; }

async function loadAuditPolicy() {
  try {
    const r = await fetch(API+'/api/admin/audit-policy');
    const d = await r.json();
    document.getElementById('auditBody').innerHTML =
      `<div class="admin-row"><label>模式</label><select onchange="updateAudit('mode',this.value)"><option ${d.mode==='none'?'selected':''}>none</option><option ${d.mode==='high_risk'?'selected':''}>high_risk</option><option ${d.mode==='all'?'selected':''}>all</option></select></div>
       <div class="admin-row"><label>数据量阈值</label><input value="${d.data_threshold||1000}" onchange="updateAudit('data_threshold',this.value)" type="number"/></div>
       <div class="admin-row"><label>复杂度阈值</label><input value="${d.complexity_threshold||1}" onchange="updateAudit('complexity_threshold',this.value)" type="number"/></div>`;
  } catch(e) { document.getElementById('auditBody').innerHTML = '<span style="color:var(--error)">加载失败</span>'; }
}

async function updateAudit(key, val) {
  try {
    const r = await fetch(API+'/api/admin/audit-policy');
    const d = await r.json();
    d[key] = key==='data_threshold'||key==='complexity_threshold' ? parseInt(val) : val;
    await fetch(API+'/api/admin/audit-policy', {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(d)});
  } catch(e) {}
}
